<!DOCTYPE html>
<html>
<head>
    <title>Byte Back Tech | Refurbished Parts</title>
    <style>
        body { font-family: sans-serif; background: #f4f4f4; margin: 0; padding: 20px; }
        .header { background: #333; color: white; padding: 20px; text-align: center; margin-bottom: 20px; }
        .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; }
        .card { background: white; padding: 15px; border-radius: 8px; shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .health { color: green; font-weight: bold; }
        .savings { color: #d9534f; font-style: italic; font-size: 0.9em; }
    </style>
</head>
<body>
    <div class="header">
        <h1>Byte Back Tech</h1>
        <p>Sustainable Gaming Parts below MSRP</p>
    </div>

    <div id="catalog" class="product-grid">
        </div>

    <script>
        async function loadCatalog() {
            const response = await fetch('/products');
            const products = await response.json();
            const container = document.getElementById('catalog');
            
            container.innerHTML = products.map(p => `
                <div class="card">
                    <h3>${p.model}</h3>
                    <p>Category: ${p.category}</p>
                    <p>Health: <span class="health">${p.health_pct}%</span></p>
                    <p><strong>Price: $${p.price_usd}</strong></p>
                    <p class="savings">${p.savings_vs_market}</p>
                    <button>Add to Cart (Guest)</button>
                </div>
            `).join('');
        }
        loadCatalog();
    </script>
</body>
</html>
